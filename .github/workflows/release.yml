name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TIMESTAMP_URL: http://timestamp.digicert.com

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: windows-latest
            rid: win-arm64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Decode code signing cert
        if: startsWith(matrix.rid, 'win-') && secrets.CODESIGN_PFX_BASE64 != '' && secrets.CODESIGN_PFX_PASSWORD != ''
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\tascade-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.CODESIGN_PFX_BASE64 }}"))
          "PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Tascade/Tascade.csproj `
            -c Release `
            -r "${{ matrix.rid }}" `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:EnableSigning=${{ startsWith(matrix.rid, 'win-') && secrets.CODESIGN_PFX_BASE64 != '' && secrets.CODESIGN_PFX_PASSWORD != '' }} `
            /p:CodeSignPfxPath="$env:PFX_PATH" `
            /p:CodeSignPfxPassword="${{ secrets.CODESIGN_PFX_PASSWORD }}" `
            /p:TimeStampUrl="${{ env.TIMESTAMP_URL }}" `
            -o "publish/${{ matrix.rid }}"

      - name: Archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $assetName = "Tascade-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}"
          if ("${{ matrix.ext }}" -eq "zip") {
            Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "dist/$assetName" -Force
          } else {
            tar -czf "dist/$assetName" -C "publish/${{ matrix.rid }}" .
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tascade-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tascade-*
          merge-multiple: true
          path: dist

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
