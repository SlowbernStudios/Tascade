name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: windows-latest
            rid: win-arm64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Tascade/Tascade.csproj `
            -c Release `
            -r "${{ matrix.rid }}" `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o "publish/${{ matrix.rid }}"

      - name: Archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $assetName = "Tascade-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}"
          if ("${{ matrix.ext }}" -eq "zip") {
            Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "dist/$assetName" -Force
          } else {
            tar -czf "dist/$assetName" -C "publish/${{ matrix.rid }}" .
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tascade-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tascade-*
          merge-multiple: true
          path: dist

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
